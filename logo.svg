<svg
  width="200"
  height="200"
  viewBox="0 0 200 200"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Outer shield ring -->
  <circle
    cx="100"
    cy="100"
    r="88"
    stroke="#b1b5b9"
    stroke-width="8"
  />

  <!-- Inner glow ring -->
  <circle
    cx="100"
    cy="100"
    r="74"
    stroke="#007AFF"
    stroke-opacity="0.25"
    stroke-width="2"
  />

  <!-- Hammer head -->
  <rect
    x="68"
    y="62"
    width="64"
    height="28"
    rx="6"
    fill="white"
  />

  <!-- Hammer handle -->
  <rect
    x="92"
    y="88"
    width="16"
    height="58"
    rx="4"
    fill="white"
  />

  <!-- Top accent -->
  <rect
    x="82"
    y="54"
    width="36"
    height="8"
    rx="4"
    fill="#435160"
  />

  <!-- Rune arrows -->
  <path
    d="M76 96L100 76L124 96"
    stroke="#007AFF"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <path
    d="M76 120L100 100L124 120"
    stroke="#007AFF"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Decorative shield dots -->
  <circle cx="100" cy="24" r="4" fill="#435160" />
  <circle cx="176" cy="100" r="4" fill="#435160" />
  <circle cx="100" cy="176" r="4" fill="#435160" />
  <circle cx="24" cy="100" r="4" fill="#435160" />

  <!-- Bottom glow -->
  <circle
    cx="100"
    cy="100"
    r="88"
    stroke="#4DA3FF"
    stroke-opacity="0.15"
    stroke-width="14"
  />
</svg>